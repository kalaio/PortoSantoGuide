services:
  db:
    image: postgres:16-alpine
    container_name: porto-santo-guide-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: porto_santo_guide
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d porto_santo_guide"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - porto_santo_guide_pgdata:/var/lib/postgresql/data

volumes:
  porto_santo_guide_pgdata:
